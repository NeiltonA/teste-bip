name: CI

on: [push, pull_request]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'
      - name: Test Java modules
        run: mvn -B test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: bip-beneficios-frontend/package-lock.json
      - name: Install dependencies
        working-directory: bip-beneficios-frontend
        run: npm ci
      - name: Build Angular app
        working-directory: bip-beneficios-frontend
        run: npm run build
      - name: Test Angular app
        working-directory: bip-beneficios-frontend
        run: npm test
